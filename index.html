<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Online</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            min-height:100vh;
            background:
                radial-gradient(circle at top left, rgba(37,99,235,0.08), transparent 28%),
                linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
            padding:32px 20px 48px;
        }
        .container { max-width:980px; margin:0 auto; }
        .hero {
            background:linear-gradient(145deg, #ffffff, #f8fafc);
            border:1px solid rgba(255,255,255,0.9);
            border-radius:28px;
            box-shadow:var(--shadow-md);
            padding:28px;
            margin-bottom:22px;
        }
        .mode-box {
            display:flex;
            flex-wrap:wrap;
            align-items:center;
            gap:12px;
            margin-bottom:14px;
            padding:14px;
            border:1px solid var(--border-color);
            border-radius:16px;
            background:#f8fafc;
        }
        .mode-box-label {
            font-size:13px;
            font-weight:700;
            color:var(--text-secondary);
        }
        .mode-options {
            display:flex;
            gap:8px;
            flex-wrap:wrap;
        }
        .mode-option {
            display:inline-flex;
            align-items:center;
            gap:8px;
            min-height:36px;
            padding:0 12px;
            border-radius:999px;
            border:1px solid var(--border-color);
            background:#ffffff;
            color:var(--text-secondary);
            font-size:12px;
            font-weight:700;
            cursor:pointer;
            transition:var(--transition);
        }
        .mode-option.active {
            background:var(--primary);
            border-color:var(--primary);
            color:#fff;
        }
        .mode-desc {
            width:100%;
            font-size:12px;
            color:var(--text-muted);
        }
        .hero-top { display:block; }
        .hero h1 { font-size:32px; line-height:1.15; font-weight:800; color:var(--text-primary); margin:12px 0 10px; }
        .hero p { max-width:560px; color:var(--text-secondary); font-size:15px; margin:0; }
        .panel {
            background:rgba(255,255,255,0.82);
            backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.75);
            border-radius:24px;
            box-shadow:var(--shadow);
            padding:24px;
        }
        .panel-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
        .panel-title h2 { font-size:18px; font-weight:800; margin:0 0 4px; color:var(--text-primary); }
        .panel-title p { font-size:13px; color:var(--text-muted); margin:0; }
        .count-chip {
            padding:8px 12px;
            border-radius:999px;
            background:#f1f5f9;
            color:var(--text-secondary);
            font-size:12px;
            font-weight:700;
        }
        .subject-list { list-style:none; margin:0; padding:0; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .subject-item {
            display:flex;
            align-items:center;
            gap:14px;
            padding:18px;
            background:#f8fafc;
            border:1px solid var(--border-color);
            border-radius:20px;
            color:var(--text-primary);
            transition:var(--transition);
            min-width:0;
            text-decoration:none;
        }
        .subject-item:hover {
            transform:translateY(-2px);
            border-color:rgba(37,99,235,0.2);
            box-shadow:var(--shadow-sm);
            background:#ffffff;
        }
        .subject-body { flex:1; min-width:0; }
        .subject-name { font-size:16px; font-weight:700; color:var(--text-primary); margin:0 0 6px; display:block; }
        .subject-meta { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
        .subject-count { font-size:12px; color:var(--text-muted); }
        .subject-action {
            display:inline-flex;
            align-items:center;
            justify-content:center;
            padding:10px 14px;
            border-radius:12px;
            background:var(--primary);
            color:#fff;
            font-size:13px;
            font-weight:700;
            flex-shrink:0;
        }
        .empty-state { text-align:center; color:var(--text-muted); font-size:14px; padding:28px 0; }
        .no-questions {
            opacity:0.68;
            pointer-events:none;
            background:#f1f5f9;
        }
        .no-questions .subject-action {
            background:#cbd5e1;
            color:#475569;
        }
        .contact-link { position:fixed; right:18px; bottom:18px; display:inline-flex; align-items:center; min-height:42px; padding:0 14px; border-radius:999px; background:#fff; border:1px solid var(--border-color); box-shadow:var(--shadow); color:var(--text-primary); font-size:13px; font-weight:700; z-index:50; text-decoration:none; }
        .contact-link:hover { color:var(--primary); border-color:rgba(37,99,235,0.22); }
        .loading-state { text-align:center; color:var(--text-muted); font-size:14px; padding:28px 0; }
        @media (max-width: 760px) {
            body { padding:20px 14px 36px; }
            .hero { padding:22px 18px; border-radius:22px; }
            .hero-top, .panel-head { flex-direction:column; align-items:flex-start; }
            .hero h1 { font-size:26px; }
            .subject-list { grid-template-columns:1fr; }
            .subject-item { align-items:flex-start; }
            .subject-action { margin-left:auto; }
            .contact-link { right:12px; bottom:12px; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="hero">
        <div class="mode-box" id="modeBox">
            <span class="mode-box-label">Chọn chế độ làm bài:</span>
            <div class="mode-options">
                <button type="button" class="mode-option" data-mode="instant">Vừa làm vừa hiện đáp án</button>
                <button type="button" class="mode-option" data-mode="submit">Làm hết rồi nộp mới hiện</button>
            </div>
            <p class="mode-desc" id="modeDesc"></p>
        </div>
    </div>

    <div class="panel">
        <div class="panel-head">
            <div class="panel-title">
                <h2>Danh sách môn học</h2>
                <p>Môn nào có câu hỏi sẽ hiện nút vào thi ngay trong thẻ.</p>
            </div>
            <div class="count-chip" id="subjectCountChip">...</div>
        </div>
        <div id="subjectListContainer">
            <div class="loading-state">Đang tải danh sách môn học...</div>
        </div>
    </div>

</div>
<a class="contact-link" href="https://www.facebook.com/userqhun" target="_blank" rel="noopener noreferrer">qhun22</a>

<script>
(async function() {
    const container = document.getElementById('subjectListContainer');
    const countChip = document.getElementById('subjectCountChip');
    const modeBox = document.getElementById('modeBox');
    const modeDesc = document.getElementById('modeDesc');
    const MODE_STORAGE_KEY = 'exam_mode';

    function getExamMode() {
        const saved = localStorage.getItem(MODE_STORAGE_KEY);
        return saved === 'instant' ? 'instant' : 'submit';
    }

    function getModeDesc(mode) {
        if (mode === 'instant') {
            return 'Mỗi câu sẽ hiển thị đáp án đúng/sai ngay khi bạn thao tác.';
        }
        return 'Hệ thống chỉ hiển thị đáp án đúng/sai sau khi bạn bấm nộp bài.';
    }

    function renderModeUI() {
        const mode = getExamMode();
        modeBox.querySelectorAll('.mode-option').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === mode);
        });
        modeDesc.textContent = getModeDesc(mode);
    }

    modeBox.querySelectorAll('.mode-option').forEach(btn => {
        btn.addEventListener('click', function() {
            localStorage.setItem(MODE_STORAGE_KEY, this.dataset.mode);
            renderModeUI();
            renderSubjectList(window.__subjectsData || [], window.__countsData || []);
        });
    });

    function renderSubjectList(subjects, counts) {
        if (!Array.isArray(subjects) || subjects.length === 0) {
            container.innerHTML = '<div class="empty-state">Chưa có môn học nào.</div>';
            return;
        }

        const selectedMode = getExamMode();
        let html = '<ul class="subject-list">';
        subjects.forEach((s, i) => {
            const qCount = counts[i];
            const cls = qCount === 0 ? 'subject-item no-questions' : 'subject-item';
            const href = qCount > 0
                ? 'exam.html?subject=' + encodeURIComponent(s.id) + '&mode=' + encodeURIComponent(selectedMode)
                : '#';
            const actionText = qCount > 0 ? 'Vào thi' : 'Chưa có đề';

            html += '<a href="' + href + '" class="' + cls + '">';
            html += '<span class="subject-body">';
            html += '<span class="subject-name">' + escapeHtml(s.name) + '</span>';
            html += '<span class="subject-meta">';
            html += '<span class="subject-count">' + qCount + ' câu hỏi</span>';
            html += '</span>';
            html += '</span>';
            html += '<span class="subject-action">' + actionText + '</span>';
            html += '</a>';
        });
        html += '</ul>';

        container.innerHTML = html;
    }

    renderModeUI();

    try {
        const resp = await fetch('data/subjects.json');
        if (!resp.ok) throw new Error('Không tải được subjects.json');
        const subjects = await resp.json();

        countChip.textContent = subjects.length + ' môn';

        if (subjects.length === 0) {
            container.innerHTML = '<div class="empty-state">Chưa có môn học nào.</div>';
            return;
        }

        // Fetch question counts in parallel
        const countPromises = subjects.map(async (s) => {
            try {
                const r = await fetch('data/questions_' + s.id + '.json');
                if (!r.ok) return 0;
                const questions = await r.json();
                return Array.isArray(questions) ? questions.length : 0;
            } catch(e) { return 0; }
        });

        const counts = await Promise.all(countPromises);
        window.__subjectsData = subjects;
        window.__countsData = counts;

        renderSubjectList(subjects, counts);

    } catch(err) {
        container.innerHTML = '<div class="empty-state">Lỗi tải dữ liệu: ' + escapeHtml(err.message) + '</div>';
    }
})();

function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}
</script>
</body>
</html>
